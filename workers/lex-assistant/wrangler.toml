name = "miotti-lex"
main = "src/index.ts"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]

# Production environment
[env.production]
name = "miotti-lex"
routes = [
  { pattern = "lex.studiomiotti.it", custom_domain = true }
]

# Rate limiting via KV (per anti-abuso)
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "{{TODO_KV_NAMESPACE_ID}}"

# Durable Objects per session state (opzionale, fase 2)
# [[durable_objects.bindings]]
# name = "LEX_SESSION"
# class_name = "LexSession"

# Variabili pubbliche (le secret si settano con `wrangler secret put`)
[vars]
SUPABASE_URL = "https://{{TODO_PROJECT_REF}}.supabase.co"
ALLOWED_ORIGINS = "https://studiomiotti.it,https://adrian-vee.github.io"

# Secret da configurare con: wrangler secret put NOME_SECRET
# - ANTHROPIC_API_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - RESEND_API_KEY
